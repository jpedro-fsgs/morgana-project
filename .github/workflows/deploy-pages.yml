name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Godot project (Web)
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_preset: Web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add coi-serviceworker (SharedArrayBuffer fix)
        run: |
          EXPORT_DIR="/home/runner/.local/share/godot/builds/Web"
          echo "Export dir: $EXPORT_DIR"
          ls -la "$EXPORT_DIR"

          # Download coi-serviceworker para habilitar SharedArrayBuffer no GitHub Pages
          curl -fsSL https://cdn.jsdelivr.net/npm/coi-serviceworker/coi-serviceworker.min.js \
            -o "$EXPORT_DIR/coi-serviceworker.min.js"

          # Injetar o script no index.html
          sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' "$EXPORT_DIR/index.html"

          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.EXPORT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
